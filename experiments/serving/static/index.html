<!DOCTYPE html>
<html lang="scn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tradutturi Sicilianu</title>
  <meta name="description" content="Traduci tra Sicilianu, Nglisi e Talianu. Translate between Sicilian, English and Italian.">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="bar">
      <h1>Tradutturi <span class="gold">Sicilianu</span></h1>
      <p class="tag">Sicilianu &middot; Nglisi &middot; Talianu &nbsp;|&nbsp; Sicilian &middot; English &middot; Italian</p>
    </div>
  </header>

  <main>
    <div class="dir">
      <select id="srcLang" aria-label="source language">
        <option value="scn">Sicilianu</option>
        <option value="en">English</option>
        <option value="it">Italiano</option>
      </select>
      <button id="swap" title="Gira / Swap" aria-label="swap">&#8646;</button>
      <select id="tgtLang" aria-label="target language">
        <option value="en">English</option>
        <option value="scn">Sicilianu</option>
        <option value="it">Italiano</option>
      </select>
    </div>

    <div class="panes">
      <textarea id="src" placeholder="Scrivi cc&agrave;&#8230; / Type here&#8230;" autofocus></textarea>
      <textarea id="tgt" placeholder="Traduzioni / Translation" readonly></textarea>
    </div>

    <div class="actions">
      <button id="go">Traduci &middot; Translate</button>
      <span id="status" class="status"></span>
    </div>
  </main>

  <footer>
    <p>NLLB-200 fine-tuned on <em>Arba Sicula</em> &middot;
       <a href="https://github.com/dmeoli/SicilianNMT">github.com/dmeoli/SicilianNMT</a></p>
    <p class="thanks">Grazzi a Arba Sicula, Gaetano Cipolla, Arthur Dieli &middot; building on Eryk Wdowiak's <em>Tradutturi</em>.</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
