<!DOCTYPE html>
<html lang="scn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tradutturi Sicilianu</title>
  <meta name="description" content="Traduci tra Sicilianu e Nglisi. Translate between Sicilian and English.">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="bar">
      <h1>Tradutturi <span class="gold">Sicilianu</span></h1>
      <p class="tag">Sicilianu &#8596; Nglisi &nbsp;&middot;&nbsp; Sicilian &#8596; English</p>
    </div>
  </header>

  <main>
    <div class="dir">
      <span id="srcLabel" class="lang">Sicilianu</span>
      <button id="swap" title="Gira / Swap" aria-label="swap">&#8646;</button>
      <span id="tgtLabel" class="lang">English</span>
    </div>

    <div class="panes">
      <textarea id="src" placeholder="Scrivi ccà&#8230; / Type here&#8230;" autofocus></textarea>
      <textarea id="tgt" placeholder="Traduzioni / Translation" readonly></textarea>
    </div>

    <div class="actions">
      <button id="go">Traduci &middot; Translate</button>
      <span id="status" class="status"></span>
    </div>
  </main>

  <footer>
    <p>NLLB-200 fine-tuned on <em>Arba Sicula</em> &middot;
       <a href="https://github.com/dmeoli/SicilianNMT">github.com/dmeoli/SicilianNMT</a></p>
    <p class="thanks">Grazzi a Arba Sicula, Gaetano Cipolla, Arthur Dieli &middot; building on Eryk Wdowiak's <em>Tradutturi</em>.</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
